# NemoClaw default configuration
# Override with environment variables: NEMOCLAW_<SETTING_NAME>
# Or place a .env file in the project root.

# Base directory for NemoClaw data (sessions, memory, etc.)
base_dir: "~/.nemoclaw"

# LLM provider settings (OpenAI-compatible endpoint)
llm_base_url: "http://localhost:11434/v1"
llm_model: "qwen3.5:35b"
llm_api_key: "ollama"
llm_temperature: 0.7
llm_max_tokens: 4096

# Persona file (relative to project root)
persona_path: "alice/ALICE.md"

# Memory and session directories (relative to base_dir)
memory_dir: "memory"
session_dir: "sessions"

# Agent loop
max_turns: 25

# Transport: cli or telegram
transport: "cli"

# Permissions — layered allow/deny/ask for tool calls
permissions_always_allow:
  - read_file
  - glob
  - web_fetch
  - memory_search
permissions_always_deny: []
permissions_always_ask:
  - bash
permissions_auto_allow_after_n: 3

# Guards — clause guards CG-01..CG-05
guards_enabled: true
guards_patterns_path: "nemoclaw/guards/patterns.yaml"

# Context window management
max_context_tokens: 32768
